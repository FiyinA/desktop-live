<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Desktop Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070710;
      --bg2: #0d0d1a;
      --bg3: #12122a;
      --border: rgba(255,255,255,0.07);
      --blue: #0088ff;
      --blue-glow: rgba(0,136,255,0.3);
      --blue-dim: rgba(0,136,255,0.15);
      --green: #00ffaa;
      --green-glow: rgba(0,255,170,0.3);
      --text: #e8e8f0;
      --text-dim: rgba(232,232,240,0.4);
      --text-mid: rgba(232,232,240,0.7);
      --red: #ff4466;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
      user-select: none;
    }

    /* ── Titlebar ── */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      -webkit-app-region: drag;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .titlebar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 8px var(--blue-glow);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { opacity: 0.7; box-shadow: 0 0 6px var(--blue-glow); }
      50% { opacity: 1; box-shadow: 0 0 14px var(--blue-glow); }
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--text-mid);
      text-transform: uppercase;
    }

    .titlebar-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .win-btn {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .win-btn:hover { opacity: 1; }
    .win-btn.minimize { background: #ffbb00; }
    .win-btn.close { background: #ff4444; }

    /* ── Main Content ── */
    .content {
      display: flex;
      flex-direction: column;
      height: calc(100% - 45px);
      padding: 20px 16px;
      gap: 16px;
      overflow-y: auto;
    }

    /* ── Status Card ── */
    .status-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .status-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, var(--blue-dim) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .status-card.active::before { opacity: 1; }
    .status-card.speaking::before {
      background: radial-gradient(ellipse at 50% 0%, rgba(0,255,170,0.1) 0%, transparent 70%);
      opacity: 1;
    }

    /* ── Orb ── */
    .orb-container {
      position: relative;
      width: 80px; height: 80px;
    }

    .orb {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%,
        rgba(0,136,255,0.3) 0%,
        rgba(0,68,200,0.15) 50%,
        transparent 70%
      );
      border: 1px solid rgba(0,136,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s ease;
      position: relative;
    }

    .orb-icon {
      font-size: 28px;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 8px var(--blue-glow));
    }

    .orb-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(0,136,255,0.2);
      animation: none;
    }

    .orb-ring2 {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(0,136,255,0.1);
    }

    /* Active orb states */
    .orb-container.listening .orb {
      background: radial-gradient(circle at 35% 35%,
        rgba(0,136,255,0.5) 0%,
        rgba(0,68,200,0.3) 50%,
        transparent 70%
      );
      border-color: rgba(0,136,255,0.8);
      box-shadow: 0 0 20px var(--blue-glow), 0 0 40px rgba(0,136,255,0.15);
    }

    .orb-container.listening .orb-ring {
      animation: orbRing 1.5s ease-out infinite;
    }

    .orb-container.listening .orb-ring2 {
      animation: orbRing 1.5s ease-out infinite 0.5s;
    }

    .orb-container.speaking .orb {
      background: radial-gradient(circle at 35% 35%,
        rgba(0,255,170,0.5) 0%,
        rgba(0,200,120,0.3) 50%,
        transparent 70%
      );
      border-color: rgba(0,255,170,0.8);
      box-shadow: 0 0 20px var(--green-glow), 0 0 40px rgba(0,255,170,0.15);
    }

    .orb-container.speaking .orb-icon {
      filter: drop-shadow(0 0 8px var(--green-glow));
    }

    .orb-container.speaking .orb-ring {
      animation: orbRing 0.8s ease-out infinite;
      border-color: rgba(0,255,170,0.3);
    }

    .orb-container.speaking .orb-ring2 {
      animation: orbRing 0.8s ease-out infinite 0.3s;
      border-color: rgba(0,255,170,0.15);
    }

    @keyframes orbRing {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    /* ── Status text ── */
    .status-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: color 0.3s ease;
    }

    .status-label.active { color: var(--blue); }
    .status-label.speaking { color: var(--green); }

    /* ── Wave Bars (when speaking) ── */
    .wave-bars {
      display: flex;
      gap: 3px;
      align-items: center;
      height: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .wave-bars.visible { opacity: 1; }

    .bar {
      width: 3px;
      background: var(--green);
      border-radius: 2px;
      animation: none;
    }

    .wave-bars.visible .bar:nth-child(1) { animation: wave 0.8s ease-in-out infinite 0.0s; }
    .wave-bars.visible .bar:nth-child(2) { animation: wave 0.8s ease-in-out infinite 0.1s; }
    .wave-bars.visible .bar:nth-child(3) { animation: wave 0.8s ease-in-out infinite 0.2s; }
    .wave-bars.visible .bar:nth-child(4) { animation: wave 0.8s ease-in-out infinite 0.3s; }
    .wave-bars.visible .bar:nth-child(5) { animation: wave 0.8s ease-in-out infinite 0.2s; }
    .wave-bars.visible .bar:nth-child(6) { animation: wave 0.8s ease-in-out infinite 0.1s; }
    .wave-bars.visible .bar:nth-child(7) { animation: wave 0.8s ease-in-out infinite 0.0s; }

    @keyframes wave {
      0%, 100% { height: 4px; }
      50% { height: 18px; }
    }

    /* ── Big Start Button ── */
    .start-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid rgba(0,136,255,0.4);
      background: linear-gradient(135deg, rgba(0,136,255,0.15) 0%, rgba(0,68,200,0.1) 100%);
      color: var(--blue);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .start-btn:hover {
      background: linear-gradient(135deg, rgba(0,136,255,0.25) 0%, rgba(0,68,200,0.2) 100%);
      border-color: rgba(0,136,255,0.8);
      box-shadow: 0 0 20px var(--blue-glow);
      transform: translateY(-1px);
    }

    .start-btn.active {
      border-color: rgba(255,68,102,0.6);
      background: linear-gradient(135deg, rgba(255,68,102,0.15) 0%, rgba(200,30,60,0.1) 100%);
      color: var(--red);
    }

    .start-btn.active:hover {
      border-color: rgba(255,68,102,0.9);
      box-shadow: 0 0 20px rgba(255,68,102,0.3);
    }

    /* ── Transcript ── */
    .transcript-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 2px;
    }

    .transcript-box {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      overflow-y: auto;
      min-height: 120px;
      max-height: 200px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .transcript-box::-webkit-scrollbar { width: 4px; }
    .transcript-box::-webkit-scrollbar-track { background: transparent; }
    .transcript-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      font-size: 12px;
      line-height: 1.5;
      padding: 8px 10px;
      border-radius: 8px;
      max-width: 90%;
      animation: msgIn 0.3s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      background: rgba(0,136,255,0.12);
      border: 1px solid rgba(0,136,255,0.2);
      color: var(--text);
      align-self: flex-end;
    }

    .msg.ai {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text-mid);
      align-self: flex-start;
    }

    .msg.system {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 10px;
      align-self: center;
      text-align: center;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 11px;
      font-family: var(--mono);
      text-align: center;
      line-height: 1.6;
    }

    /* ── Settings Section ── */
    .settings-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .input-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .api-input {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .api-input:focus {
      border-color: rgba(0,136,255,0.5);
    }

    .api-input::placeholder {
      color: var(--text-dim);
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .footer-text {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .footer-link {
      font-family: var(--mono);
      font-size: 9px;
      color: rgba(0,136,255,0.6);
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.1em;
    }

    .footer-link:hover { color: var(--blue); }

    /* ── Error Toast ── */
    .error-toast {
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: rgba(255,68,102,0.15);
      border: 1px solid rgba(255,68,102,0.4);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      color: var(--red);
      font-family: var(--mono);
      transform: translateY(100px);
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .error-toast.show { transform: translateY(0); }

    /* ── Screen indicator chips ── */
    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .chip.on {
      border-color: rgba(0,136,255,0.4);
      color: var(--blue);
      background: rgba(0,136,255,0.08);
    }

    .chip-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }
  </style>
</head>
<body>

  <!-- Titlebar -->
  <div class="titlebar">
    <div class="titlebar-logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Desktop Live</span>
    </div>
    <div class="titlebar-controls">
      <button class="win-btn minimize" onclick="minimize()"></button>
      <button class="win-btn close" onclick="closeApp()"></button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="content">

    <!-- Status Card -->
    <div class="status-card" id="statusCard">
      <div class="orb-container" id="orbContainer">
        <div class="orb-ring2"></div>
        <div class="orb-ring"></div>
        <div class="orb">
          <span class="orb-icon" id="orbIcon">🎙️</span>
        </div>
      </div>
      <span class="status-label" id="statusLabel">Ready</span>
      <div class="wave-bars" id="waveBars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>

      <!-- Feature chips -->
      <div class="chips">
        <div class="chip" id="chipMic"><div class="chip-dot"></div>MIC</div>
        <div class="chip" id="chipScreen"><div class="chip-dot"></div>SCREEN</div>
        <div class="chip" id="chipAI"><div class="chip-dot"></div>GEMINI</div>
      </div>
    </div>

    <!-- Start/Stop Button -->
    <button class="start-btn" id="startBtn" onclick="toggleLive()">
      <span id="btnIcon">▶</span>
      <span id="btnText">Start Live</span>
    </button>

    <!-- Transcript -->
    <div class="transcript-section">
      <div class="section-label">Conversation</div>
      <div class="transcript-box" id="transcriptBox">
        <div class="empty-state" id="emptyState">
          Start Live to begin<br>talking to Gemini
        </div>
      </div>
    </div>

    <!-- API Key Settings -->
    <div class="settings-section">
      <div class="input-group">
        <div class="input-label">Gemini API Key</div>
        <input
          type="password"
          class="api-input"
          id="apiKeyInput"
          placeholder="AIza..."
          autocomplete="off"
        />
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-text">v1.0.0</span>
      <a class="footer-link" onclick="openDocs()">Get API Key ↗</a>
    </div>

  </div>

  <!-- Error Toast -->
  <div class="error-toast" id="errorToast"></div>

  <script src="renderer.js"></script>
</body>
</html>
