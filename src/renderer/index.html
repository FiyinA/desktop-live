<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Desktop Live</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f8f8fc;
      --surface: #f0eff8;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-light: rgba(99,102,241,0.1);
      --text: #1a1a2e;
      --text-mid: #6b7280;
      --text-dim: #9ca3af;
      --border: #e8e7f3;
      --red: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    /* Keep-alive: invisible pseudo-element animation keeps the Chromium compositor
       alive without touching body opacity (which wobbles subpixel text rendering) */
    @keyframes _compositor-keepalive { to { transform: translateX(0.0001px) } }

    body {
      position: fixed;
      inset: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
      display: flex;
      flex-direction: column;
    }

    body::after {
      content: '';
      position: fixed;
      top: -2px; left: -2px;
      width: 1px; height: 1px;
      opacity: 0;
      pointer-events: none;
      animation: _compositor-keepalive 60s linear infinite alternate;
    }

    /* ── Titlebar ── */
    .titlebar {
      display: flex;
      align-items: center;
      height: 44px;
      padding: 0 12px;
      -webkit-app-region: drag;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .win-controls {
      display: flex;
      gap: 4px;
      align-items: center;
      -webkit-app-region: no-drag;
    }

    .win-btn {
      width: 28px; height: 28px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--bg2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      line-height: 1;
      color: var(--text-mid);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .win-btn.minimize:hover { background: #fef3c7; border-color: #fbbf24; color: #92400e; }
    .win-btn.close:hover    { background: #fee2e2; border-color: #fca5a5; color: #b91c1c; }

    .app-title {
      flex: 1;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .gear-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      cursor: pointer;
      width: 28px; height: 28px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 16px;
      transition: background 0.15s, color 0.15s;
    }
    .gear-btn:hover { background: var(--surface); color: var(--accent); }
    .gear-btn.open { color: var(--accent); background: var(--accent-light); }

    /* ── Settings Panel ── */
    .settings-panel {
      flex-shrink: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
      background: var(--bg2);
      border-bottom: 1px solid transparent;
    }
    .settings-panel.open {
      max-height: 76px;
      border-bottom-color: var(--border);
    }
    .settings-inner {
      padding: 10px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .settings-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .api-input {
      padding: 7px 11px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      outline: none;
      transition: border-color 0.2s;
      -webkit-app-region: no-drag;
      user-select: text;
    }
    .api-input:focus { border-color: var(--accent); }
    .api-input::placeholder { color: var(--text-dim); }

    /* ── Main Content ── */
    .content {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Start Button ── */
    .start-wrap {
      padding: 12px 16px 0;
      flex-shrink: 0;
    }

    .start-btn {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .start-btn:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 16px rgba(99,102,241,0.35);
    }
    .start-btn:active { transform: scale(0.98); }
    .start-btn.live { background: var(--red); }
    .start-btn.live:hover { background: #dc2626; box-shadow: 0 4px 16px rgba(239,68,68,0.3); }

    /* ── Chat Toggle Button ── */
    .chat-toggle-row {
      padding: 6px 16px 2px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .chat-toggle-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      -webkit-app-region: no-drag;
    }
    .chat-toggle-btn:hover { color: var(--text); background: var(--surface); }

    /* ── Chat Panel (collapsible) ── */
    .chat-panel {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: max-height 0.28s ease, opacity 0.22s ease;
      max-height: 2000px;
      opacity: 1;
    }
    .chat-panel.hidden {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Chat Window ── */
    .chat-window {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transform: translateZ(0);
    }

    .chat-window::-webkit-scrollbar { width: 3px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }
    .chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.7;
    }

    .msg {
      max-width: 80%;
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.5;
      animation: msgIn 0.2s ease;
      word-wrap: break-word;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      background: var(--accent);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.ai {
      background: var(--surface);
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      color: var(--text-dim);
      font-size: 11px;
      background: transparent;
      padding: 2px 4px;
    }

    /* ── Text Input Area ── */
    .text-input-area {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .text-input {
      flex: 1;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg2);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-app-region: no-drag;
      user-select: text;
    }
    .text-input:focus {
      border-color: var(--accent);
      background: var(--bg);
    }
    .text-input::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:active { transform: scale(0.9); }

    /* ── Bottom Toolbar ── */
    .bottom-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px 14px;
      flex-shrink: 0;
    }

    .tool-btn {
      position: relative;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--bg2);
      color: var(--text-mid);
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      -webkit-app-region: no-drag;
    }
    .tool-btn:hover {
      background: var(--surface);
      border-color: #d4d3e8;
      color: var(--text);
    }

    /* Mic glow when active — steady green halo that breathes softly */
    .mic-btn.active {
      border-color: #10b981;
      background: rgba(16,185,129,0.1);
      color: #10b981;
      animation: micGlow 2.4s ease-in-out infinite;
    }
    @keyframes micGlow {
      0%, 100% { box-shadow: 0 0 0 3px rgba(16,185,129,0.25), 0 0 10px rgba(16,185,129,0.15); }
      50%       { box-shadow: 0 0 0 5px rgba(16,185,129,0.35), 0 0 18px rgba(16,185,129,0.25); }
    }

    .mic-btn.muted {
      border-color: var(--red);
      background: rgba(239,68,68,0.08);
      color: var(--red);
    }

    .file-btn {
      font-size: 22px;
      font-weight: 300;
      color: var(--text-mid);
    }

    /* ── Screen Picker Dropdown ── */
    .screen-picker {
      position: fixed;
      bottom: 72px;
      left: 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      overflow: hidden;
      display: none;
      z-index: 200;
      min-width: 190px;
      max-width: 300px;
    }
    .screen-picker.open { display: block; }
    .screen-picker-title {
      padding: 8px 14px 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .screen-picker-item {
      padding: 9px 14px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      transition: background 0.12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .screen-picker-item:hover { background: var(--surface); }
    .screen-picker-item.selected { color: var(--accent); font-weight: 500; }

    /* ── Error Toast ── */
    .error-toast {
      position: fixed;
      bottom: 16px; left: 16px; right: 16px;
      background: #fff0f0;
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--red);
      transform: translateY(100px);
      transition: transform 0.25s ease;
      z-index: 300;
    }
    .error-toast.show { transform: translateY(0); }
  </style>
</head>
<body>

  <!-- Titlebar -->
  <div class="titlebar">
    <button class="gear-btn" id="gearBtn" onclick="toggleSettings()">⚙</button>
    <span class="app-title">Desktop Live</span>
    <div class="win-controls">
      <button class="win-btn minimize" onclick="minimize()" title="Minimize">&#8722;</button>
      <button class="win-btn close" onclick="closeApp()" title="Close">&#10005;</button>
    </div>
  </div>

  <!-- Settings Panel (hidden by default) -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-inner">
      <span class="settings-label">Gemini API Key</span>
      <input
        type="password"
        class="api-input"
        id="apiKeyInput"
        placeholder="AIza..."
        autocomplete="off"
      />
    </div>
  </div>

  <!-- Main Content -->
  <div class="content">

    <!-- Start Button -->
    <div class="start-wrap">
      <button class="start-btn" id="startBtn" onclick="toggleLive()">
        <span id="btnIcon">▶</span>
        <span id="btnText">Start Live</span>
      </button>
    </div>

    <!-- Chat Toggle -->
    <div class="chat-toggle-row">
      <button class="chat-toggle-btn" id="chatToggleBtn" onclick="toggleChat()">
        <span id="chatToggleIcon">▾</span>
        <span id="chatToggleText">Show Chat</span>
      </button>
    </div>

    <!-- Chat Panel (hidden by default) -->
    <div class="chat-panel hidden" id="chatPanel">

      <!-- Chat Window -->
      <div class="chat-window" id="transcriptBox">
        <div class="empty-state" id="emptyState">
          <span>Click <strong>Start Live</strong> to begin talking</span>
        </div>
      </div>

      <!-- Text Input -->
      <div class="text-input-area">
        <input
          type="text"
          class="text-input"
          id="textInput"
          placeholder="Type a message..."
          onkeydown="handleTextKey(event)"
        />
        <button class="send-btn" onclick="sendTextMessage()">›</button>
      </div>

    </div>

    <!-- Bottom Toolbar -->
    <div class="bottom-bar">
      <button class="tool-btn mic-btn" id="micBtn" onclick="toggleMute()" title="Mute / Unmute mic">
        🎙️
      </button>
      <button class="tool-btn" id="screenBtn" onclick="pickScreen()" title="Select screen">
        🖥️
      </button>
      <button class="tool-btn file-btn" id="fileBtn" onclick="uploadFile()" title="Upload file">
        +
      </button>
    </div>

  </div>

  <!-- Screen Picker Dropdown -->
  <div class="screen-picker" id="screenPicker"></div>

  <!-- Error Toast -->
  <div class="error-toast" id="errorToast"></div>

  <script src="renderer.js"></script>
</body>
</html>
